name: Node.js CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run automated test
      run: node app.test.js